<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | AI 뉴스 서비스 앱</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <main class="login-page">
          <section class="login-content">
            <div class="login-header">
              <h1 class="login-title">
                안녕하세요 !<br />
                ㅁㅁㅁ입니다.
              </h1>
              <p class="login-desc">회원 서비스 이용을 위해 로그인 해주세요.</p>
            </div>

            <form class="login-form">
              <div class="input-group">
                <label for="email" class="input-label">이메일</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="email.example.com"
                />
              </div>

              <div class="input-group">
                <label for="password" class="input-label">비밀번호</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder=""
                />
              </div>

              <button type="submit" class="button login-submit">
                로그인하기
              </button>
            </form>

            <div class="sns-login">
              <p class="sns-title">SNS계정으로 로그인하기</p>

              <div class="sns-list">
                <a href="#" class="sns-item" aria-label="카카오 로그인">
                  <img src="assets/icons/kakao.png" alt="카카오" />
                </a>

                <a href="#" class="sns-item" aria-label="네이버 로그인">
                  <img src="assets/icons/naver.png" alt="네이버" />
                </a>

                <a href="#" class="sns-item" aria-label="인스타그램 로그인">
                  <img src="assets/icons/instagram.png" alt="인스타그램" />
                </a>

                <a href="#" class="sns-item" aria-label="구글 로그인">
                  <img src="assets/icons/google.png" alt="구글" />
                </a>
              </div>
            </div>
          </section>

          <div class="login-footer">
            <a href="signup-2.html" class="button button-outline join-button">
              계정이 없으신가요? 간편가입하기ㄴ
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관심 분야 선택 | AI 뉴스 서비스 앱</title>
    <link rel="stylesheet" href="assets/css/common.css" />
    <link rel="stylesheet" href="assets/css/progress-2.css" />
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <main class="progress-page">
          <header class="progress-header">
            <a href="progress-1.html" class="back-button" aria-label="뒤로가기">
              <span></span>
            </a>
            <h1 class="page-title">소비 목적</h1>
          </header>

          <div class="progress-bar-wrap" aria-label="진행률">
            <div class="progress-bar">
              <span class="progress-step progress-step-active"></span>
              <span class="progress-step"></span>
            </div>
          </div>

          <section class="progress-content">
            <div class="title-wrap">
              <h2 class="section-title">뉴스 소비 목적을 선택해 주세요</h2>
              <p class="section-desc">
                복수선택 가능 <span id="count-text">(0/5)</span>
              </p>
            </div>

            <div class="interest-list">
              <button type="button" class="interest-card">
                <strong class="interest-title">투자 인사이트</strong>
                <p class="interest-desc">실전 투자 정보</p>
              </button>

              <button type="button" class="interest-card">
                <strong class="interest-title">커리어 성장</strong>
                <p class="interest-desc">실무 지식 및 대화 주제</p>
              </button>

              <button type="button" class="interest-card">
                <strong class="interest-title">세상 흐름 파악</strong>
                <p class="interest-desc">상식 및 시사</p>
              </button>

              <button type="button" class="interest-card">
                <strong class="interest-title">가치 소비</strong>
                <p class="interest-desc">친환경 브랜드 및 제품 정보</p>
              </button>
            </div>
          </section>

          <div class="next-button-wrap">
            <a href="home.html" class="next-button">다음</a>
          </div>
        </main>
      </div>
    </div>

    <script>
      const cards = document.querySelectorAll(".interest-card");
      const countText = document.getElementById("count-text");
      const maxCount = 5;

      function updateCount() {
        const selectedCount = document.querySelectorAll(
          ".interest-card.is-selected",
        ).length;
        countText.textContent = `(${selectedCount}/${maxCount})`;
      }

      cards.forEach((card) => {
        card.addEventListener("click", () => {
          card.classList.toggle("is-selected");
          updateCount();
        });
      });

      updateCount();
    </script>
  </body>
</html>
